name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: crm_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          # Histórico completo: `turbo test --filter=...[origin/main]` precisa
          # resolver a ref origin/main (checkout raso quebra o filtro por SCM).
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: node_modules/.bin/prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run Prisma migrations (test DB)
        run: node_modules/.bin/prisma migrate deploy --schema=packages/db/prisma/schema.prisma
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5435/crm_test"
          DIRECT_DATABASE_URL: "postgresql://test:test@localhost:5435/crm_test"

      - name: Integration tests
        run: pnpm turbo test --filter=...[origin/main]
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5435/crm_test"
          DIRECT_DATABASE_URL: "postgresql://test:test@localhost:5435/crm_test"
          AUTH_SECRET: "ci-integration-secret-32-chars-ok"
          AUTH_URL: "http://localhost:3000"
          OPENROUTER_API_KEY: "placeholder"
          INNGEST_SIGNING_KEY: "signkey-test-placeholder"
          INNGEST_EVENT_KEY: "eventkey-test-placeholder"
          META_WEBHOOK_VERIFY_TOKEN: "test-verify-token"
